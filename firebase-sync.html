<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
// ================= FIREBASE FIRESTORE SYNC SERVICE =================
// Vibe Market - Real-time data synchronization using Firestore

// Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyCCLnaJMtWiU9j6P7NDFxi3LzPLicZKg",
  authDomain: "orders-system-4ac29.firebaseapp.com",
  projectId: "orders-system-4ac29",
  storageBucket: "orders-system-4ac29.firebasestorage.app",
  messagingSenderId: "1032273437960",
  appId: "1:1032273437960:web:0fd1e5ea15801bc80af8bd"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ================= ORDER SYNC =================
const OrderSync = {
  // Subscribe to real-time order updates - ALL admins get updates instantly
  subscribe(callback) {
    db.collection('orders').onSnapshot((snapshot) => {
      const orders = [];
      snapshot.forEach(doc => {
        orders.push({ id: doc.id, ...doc.data() });
      });
      // Sort by date - newest first
      orders.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));
      callback(orders);
    });
  },

  // Create new order (from website checkout)
  async create(orderData) {
    const docRef = await db.collection('orders').add({
      ...orderData,
      createdAt: Date.now()
    });
    console.log('Order created:', docRef.id);
    return { id: docRef.id, ...orderData };
  },

  // Update order status (from admin)
  async update(orderId, updates) {
    await db.collection('orders').doc(orderId).update({
      ...updates,
      updatedAt: Date.now()
    });
    console.log('Order updated:', orderId);
  },

  // Delete order
  async delete(orderId) {
    await db.collection('orders').doc(orderId).delete();
    console.log('Order deleted:', orderId);
  },

  // Get all orders (one-time)
  async getAll() {
    const snapshot = await db.collection('orders').get();
    const orders = [];
    snapshot.forEach(doc => orders.push({ id: doc.id, ...doc.data() }));
    orders.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));
    return orders;
  }
};

// ================= PRODUCT SYNC =================
const ProductSync = {
  subscribe(callback) {
    db.collection('products').onSnapshot((snapshot) => {
      const products = {};
      snapshot.forEach(doc => {
        products[doc.id] = doc.data();
      });
      callback(products);
    });
  },

  async update(productId, updates) {
    await db.collection('products').doc(productId).update(updates);
  }
};

console.log('Firebase Firestore Sync Service Ready!');
</script>
